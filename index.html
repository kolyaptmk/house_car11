<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Тур по дому</title>
    <link rel="stylesheet" href="build/pannellum.css"/>
    <script type="text/javascript" src="build/pannellum.js"></script>
    <style>
        #panorama {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 50px;
            color: white;
            display: flex;
            gap: 20px;
        }
        .controls button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .controls button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div id="panorama"></div>
    
    <div class="controls">
        <button onclick="loadPanorama('panorama1.png')">Точка 1</button>
        <button onclick="loadPanorama('panorama2.png')">Точка 2</button>
    </div>

    <script>
        // Создаём viewer
        var viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "panorama1.png",
            "autoLoad": true,
            "compass": true
        });

        // Функция для загрузки другой панорамы
        function loadPanorama(filename) {
            // Останавливаем текущий просмотр
            viewer.destroy();
            
            // Создаём новый с нужной панорамой
            viewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": filename,
                "autoLoad": true,
                "compass": true
            });
        }
    </script>
</body>
</html>
