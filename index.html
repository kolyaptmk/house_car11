<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Моя панорама</title>
    <link rel="stylesheet" href="build/pannellum.css"/>
    <script type="text/javascript" src="build/pannellum.js"></script>
    <style>
        #panorama {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <script>
        pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "panorana.png",
            "autoLoad": true,
            "compass": true,
            "preview": false
        });
    </script>
</body>
</html>
